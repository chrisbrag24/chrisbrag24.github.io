<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  backdrop-filter: blur(10px);
}

h1 {
  font-size: 3em;
  text-shadow: 0 0 20px rgba(255,192,203,0.6);
}

.days {
  font-size: 1.5em;
  color: pink;
  text-shadow: 0 0 10px pink;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: rgba(255,192,203,0.2);
  border: 1px solid pink;
  border-radius: 30px;
  cursor: pointer;
  color: white;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.btn:hover {
  background: pink;
  color: black;
  box-shadow: 0 0 20px pink;
}

/* GALLERY */
.gallery img {
  width: 100%;
  border-radius: 15px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
}

.gallery img:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px pink;
}

/* VIDEO POPUP */
.video-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-popup video {
  width: 80%;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(255,192,203,0.5);
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}

/* FLOATING HEARTS */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity: 1;}
  100% {transform: translateY(-100vh); opacity: 0;}
}
</style>
</head>

<body>

<!-- VIDEO POPUP AUTO -->
<div class="video-popup" id="videoPopup">
  <span class="close" onclick="closeVideo()">✖</span>
  <video autoplay controls>
    <source src="Video.mp4" type="video/mp4">
  </video>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Happy 4th Anniversary ❤️</h1>
  <div class="days" id="daysCounter"></div>
  <button class="btn" onclick="goToMessage()">Read My Message 💌</button>
</div>

<!-- GALLERY -->
<h2>Our Memories 📸</h2>
<div class="gallery">
  <img src="pic1.jpeg">
  <img src="pic2.jpeg">
  <img src="pic3.jpeg">
  <img src="pic4.jpeg">
  <img src="pic5.jpeg">
  <img src="pic6.jpeg">
  <img src="pic7.jpeg">
</div>

<script>
function closeVideo() {
  document.getElementById("videoPopup").style.display = "none";
}

function goToMessage() {
  window.location.href = "message.html";
}

/* HEART ANIMATION */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

  const startDate = new Date("2022-05-07"); // 👉 CHANGE THIS to your real date

function updateDays() {
  const today = new Date();
  const diffTime = today - startDate;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  document.getElementById("daysCounter").innerText = days + " days together ❤️";
}

updateDays();
</script>

</body>
</html>
